spring.application.name=Estacionamiento
server.port=8085

# Configuraci\u00c3\u00b3n para MySQL (Contenedor local mapeado al puerto 3307)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/sicaeestacionamiento?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci\u00c3\u00b3n de Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
