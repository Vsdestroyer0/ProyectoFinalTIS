spring.application.name=Estacionamiento

# Configuración para MySQL (Contenedor local mapeado al puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/sicaeestacionamiento?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
