version: '3.8'

services:
  # Database for the Users Microservice (PostgreSQL)
  db-usuarios:
    image: docker.io/library/postgres:17-alpine
    container_name: sicae-db-usuarios
    environment:
      POSTGRES_DB: sicaeUsuario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./Databases/Usuarios/sicaeUsuario.sql:/docker-entrypoint-initdb.d/init.sql:z
      - pgdata-usuarios:/var/lib/postgresql/data
    restart: always

  # Database for the Vehiculos Microservice (MySQL)
  db-vehiculos:
    image: docker.io/library/mysql:8.0
    container_name: sicae-db-vehiculos
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: sicaevehiculo
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - ./Databases/Vehiculo/sicaevehiculo.sql:/docker-entrypoint-initdb.d/init.sql:z
      - mysql-vehiculos:/var/lib/mysql
    restart: always

  # Database for the Estacionamiento Microservice (MySQL)
  db-estacionamiento:
    image: docker.io/library/mysql:8.0
    container_name: sicae-db-estacionamiento
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: sicaeestacionamiento
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - ./Databases/Estacionamiento/sicaeestacionamiento.sql:/docker-entrypoint-initdb.d/init.sql:z
      - mysql-estacionamiento:/var/lib/mysql
    restart: always

volumes:
  pgdata-usuarios:
  mysql-vehiculos:
  mysql-estacionamiento:
